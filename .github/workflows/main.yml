name: Issue Auto Reply

permissions:
  issues: write

on:
  issues:
    types: [opened]

jobs:
  auto-reply:
    runs-on: ubuntu-latest

    steps:
      - name: Reply to issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            const issue_body = context.payload.issue.body;

            console.log("=== TASK RECEIVED ===");
            console.log(issue_body);

            const reply = [
              "Task received.",
              "",
              "Issue body:",
              issue_body,
              "",
              "PoC trigger succeeded.",
              "",
              "Future step: connect this workflow to Codex automation."
            ].join("\n");

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number,
              body: reply
            });
