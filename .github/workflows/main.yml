name: Issue Auto Reply

on:
  issues:
    types: [opened]

jobs:
  auto-reply:
    runs-on: ubuntu-latest

    steps:
      - name: Reply to issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;

            const reply = `
收到你的任務！

任務內容：
${context.payload.issue.body}

已觸發（PoC測試成功）

未來會接 Codex / 自動執行
`;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number,
              body: reply
            });
